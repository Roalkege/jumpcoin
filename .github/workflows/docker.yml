name: docker

on:
  push:
    tags:
      - "v*"

# Avoid running concurrent image builds/tag pushes
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      packages: write      # push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            with_tor: "false"
            tag_suffix: ""
            cache_tag: buildcache
            description: "Standard image (no Tor)"
          - variant: tor
            with_tor: "true"
            tag_suffix: "-tor"
            cache_tag: buildcache-tor
            description: "Image with bundled Tor daemon"
    env:
      # OCI registries require lowercase repository names.  The
      # GitHub owner may have mixed case (e.g. 'Roalkege'), so we
      # pin the registry namespace explicitly and lowercase it here
      # rather than relying on ${{ github.repository_owner }}.
      REGISTRY_OWNER: roalkege
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (standard tag set)
        id: meta-standard
        if: matrix.variant == 'standard'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin-qt
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      # For the Tor variant we rewrite the generated tag set so that
      # every tag gets a "-tor" suffix (e.g. v1.0.0 -> v1.0.0-tor,
      # v1.0 -> v1.0-tor, 1.0.0-shaabc -> 1.0.0-shaabc-tor).  We also
      # add a single stable "tor" alias for the latest semver tag
      # so users can pin a major/minor without the SHA.
      - name: Extract metadata (tor tag set)
        id: meta-tor
        if: matrix.variant == 'tor'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin-qt
          tags: |
            type=ref,event=tag,suffix=-tor
            type=semver,pattern={{version}},suffix=-tor
            type=semver,pattern={{major}}.{{minor}},suffix=-tor
            type=semver,pattern={{major}},suffix=-tor
            type=sha,format=short,suffix=-tor

      - name: Probe for existing build cache
        id: cache-probe
        # Skip cache-from on the first run (when the cache manifest
        # doesn't exist yet) - referencing a missing cache makes
        # BuildKit return a misleading "/install: not found" error
        # when the builder stage is later asked to read it.
        run: |
          if gh api -H "Accept: application/vnd.github+json" \
              /users/${{ env.REGISTRY_OWNER }}/packages/container/jumpcoin-qt/versions 2>/dev/null \
              | jq -e --arg tag "${{ matrix.cache_tag }}" \
                  '.[] | select(.metadata.container.tags[]? == $tag)' \
              >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.description }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: WITH_TOR=${{ matrix.with_tor }}
          tags: ${{ matrix.variant == 'standard' && steps.meta-standard.outputs.tags || steps.meta-tor.outputs.tags }}
          labels: ${{ matrix.variant == 'standard' && steps.meta-standard.outputs.labels || steps.meta-tor.outputs.labels }}
          # Per-variant registry cache.  Only attach cache-from when
          # the manifest already exists in the registry - the
          # missing-cache case is handled by the probe above so we
          # never ask BuildKit to read a non-existent builder stage.
          cache-from: ${{ steps.cache-probe.outputs.exists == 'true' && format('type=registry,ref=ghcr.io/{0}/jumpcoin-qt:{1}', env.REGISTRY_OWNER, matrix.cache_tag) || '' }}
          cache-to: type=registry,ref=ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin-qt:${{ matrix.cache_tag }},mode=max

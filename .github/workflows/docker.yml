name: docker

on:
  push:
    tags:
      - "v*"

# Avoid running concurrent image builds/tag pushes
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      packages: write      # push to ghcr.io
    strategy:
      fail-fast: false
      # Build the two variants sequentially.  Without a cache the
      # builder stage produces an /install directory on each run,
      # and the multi-stage COPY in the runtime stage reads it.
      # Concurrent runs would race on the buildkit content store.
      max-parallel: 1
      matrix:
        include:
          - variant: standard
            with_tor: "false"
            tag_suffix: ""
            cache_tag: buildcache
            description: "Standard image (no Tor)"
          - variant: tor
            with_tor: "true"
            tag_suffix: "-tor"
            cache_tag: buildcache-tor
            description: "Image with bundled Tor daemon"
    env:
      # OCI registries require lowercase repository names.  The
      # GitHub owner may have mixed case (e.g. 'Roalkege'), so we
      # pin the registry namespace explicitly and lowercase it here
      # rather than relying on ${{ github.repository_owner }}.
      REGISTRY_OWNER: roalkege
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (standard tag set)
        id: meta-standard
        if: matrix.variant == 'standard'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin-qt
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      # For the Tor variant we rewrite the generated tag set so that
      # every tag gets a "-tor" suffix (e.g. v1.0.0 -> v1.0.0-tor,
      # v1.0 -> v1.0-tor, 1.0.0-shaabc -> 1.0.0-shaabc-tor).  We also
      # add a single stable "tor" alias for the latest semver tag
      # so users can pin a major/minor without the SHA.
      - name: Extract metadata (tor tag set)
        id: meta-tor
        if: matrix.variant == 'tor'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin-qt
          tags: |
            type=ref,event=tag,suffix=-tor
            type=semver,pattern={{version}},suffix=-tor
            type=semver,pattern={{major}}.{{minor}},suffix=-tor
            type=semver,pattern={{major}},suffix=-tor
            type=sha,format=short,suffix=-tor

      - name: Build and push (${{ matrix.description }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: WITH_TOR=${{ matrix.with_tor }}
          tags: ${{ matrix.variant == 'standard' && steps.meta-standard.outputs.tags || steps.meta-tor.outputs.tags }}
          labels: ${{ matrix.variant == 'standard' && steps.meta-standard.outputs.labels || steps.meta-tor.outputs.labels }}
          # No cache-from / cache-to.  The registry-cache feature of
          # build-push-action@v6 interacts badly with multi-stage
          # Dockerfiles that COPY --from=builder: the first run
          # yields "failed to calculate checksum of ref ... /install:
          # not found" because BuildKit tries to read the (empty)
          # cache's builder stage output.  Disabling the cache costs
          # ~3-4 min on the first build of every tag, but it
          # actually succeeds.  We can revisit layered caching once
          # the image is published and we have a real base to cache
          # against.

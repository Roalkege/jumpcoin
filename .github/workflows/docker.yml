name: docker

on:
  push:
    tags:
      - "v*"

# Avoid running concurrent image builds/tag pushes
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      packages: write      # push to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jumpcoin-qt
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache from/to a dedicated tag in the same registry.  First
          # build is uncached, subsequent builds reuse the previous
          # image's layers (saves ~3-4 min on this heavy build).
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/jumpcoin-qt:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/jumpcoin-qt:buildcache,mode=max

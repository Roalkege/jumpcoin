name: docker

on:
  push:
    tags:
      - "v*"

# Avoid running concurrent image builds/tag pushes
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      packages: write      # push to ghcr.io
      actions: write       # write GHA layer cache
    env:
      # OCI registries require lowercase repository names.  The
      # GitHub owner may have mixed case (e.g. 'Roalkege'), so we
      # pin the registry namespace explicitly and lowercase it here
      # rather than relying on ${{ github.repository_owner }}.
      REGISTRY_OWNER: roalkege
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (standard tag set)
        id: meta-standard
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short

      # For the Tor variant we rewrite the generated tag set so that
      # every tag gets a "-tor" suffix (e.g. v1.0.0 -> v1.0.0-tor,
      # v1.0 -> v1.0-tor, 1.0.0-shaabc -> 1.0.0-shaabc-tor).  We also
      # add a single stable "tor" alias for the latest semver tag
      # so users can pin a major/minor without the SHA.
      - name: Extract metadata (tor tag set)
        id: meta-tor
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/jumpcoin
          tags: |
            type=raw,value=tor
            type=semver,pattern={{version}},suffix=-tor
            type=sha,format=short,suffix=-tor

      # Build both variants on the same runner.  The expensive builder stage
      # (Berkeley DB + Jumpcoin compilation) is identical, so BuildKit can
      # reuse it directly for the Tor build instead of compiling it twice on
      # two isolated matrix runners.
      - name: Build and push standard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: WITH_TOR=false
          tags: ${{ steps.meta-standard.outputs.tags }}
          labels: ${{ steps.meta-standard.outputs.labels }}
          cache-from: type=gha,scope=standard
          cache-to: type=gha,scope=standard,mode=max

      - name: Build and push Tor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: WITH_TOR=true
          tags: ${{ steps.meta-tor.outputs.tags }}
          labels: ${{ steps.meta-tor.outputs.labels }}
          cache-from: |
            type=gha,scope=tor
            type=gha,scope=standard
          cache-to: type=gha,scope=tor,mode=max
